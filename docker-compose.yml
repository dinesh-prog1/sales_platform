version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aisales_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aisales
      POSTGRES_USER: aisales_user
      POSTGRES_PASSWORD: aisales_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aisales_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisales_user -d aisales"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aisales_redis
    restart: unless-stopped
    command: redis-server --requirepass aisales_redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aisales_network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "aisales_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aisales_backend
    restart: unless-stopped
    environment:
      - RUNTIME_ROLE=api
      - DATABASE_URL=postgres://aisales_user:aisales_secret@postgres:5432/aisales?sslmode=disable
      - REDIS_URL=redis://:aisales_redis_secret@redis:6379/0
      - PORT=8080
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - PRODUCT_URL=${PRODUCT_URL:-https://employeegalaxy.com/employee/home/}
      - TRIAL_START_URL=${TRIAL_START_URL:-https://app.aisales.io/trial/start}
      - UPGRADE_URL=${UPGRADE_URL:-https://app.aisales.io/pricing}
      - FEEDBACK_URL=${FEEDBACK_URL:-https://app.aisales.io/feedback}
      - JWT_SECRET=${JWT_SECRET:-replace-with-a-strong-jwt-secret}
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-change-me}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - ENVIRONMENT=production
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aisales_network
    volumes:
      - uploads:/app/uploads

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: aisales_worker
    restart: unless-stopped
    environment:
      - RUNTIME_ROLE=worker
      - DATABASE_URL=postgres://aisales_user:aisales_secret@postgres:5432/aisales?sslmode=disable
      - REDIS_URL=redis://:aisales_redis_secret@redis:6379/0
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - PRODUCT_URL=${PRODUCT_URL:-https://employeegalaxy.com/employee/home/}
      - TRIAL_START_URL=${TRIAL_START_URL:-https://app.aisales.io/trial/start}
      - UPGRADE_URL=${UPGRADE_URL:-https://app.aisales.io/pricing}
      - FEEDBACK_URL=${FEEDBACK_URL:-https://app.aisales.io/feedback}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aisales_network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.scheduler
    container_name: aisales_scheduler
    restart: unless-stopped
    environment:
      - RUNTIME_ROLE=scheduler
      - DATABASE_URL=postgres://aisales_user:aisales_secret@postgres:5432/aisales?sslmode=disable
      - REDIS_URL=redis://:aisales_redis_secret@redis:6379/0
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - PRODUCT_URL=${PRODUCT_URL:-https://employeegalaxy.com/employee/home/}
      - TRIAL_START_URL=${TRIAL_START_URL:-https://app.aisales.io/trial/start}
      - UPGRADE_URL=${UPGRADE_URL:-https://app.aisales.io/pricing}
      - FEEDBACK_URL=${FEEDBACK_URL:-https://app.aisales.io/feedback}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aisales_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aisales_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      - NEXT_PUBLIC_ADMIN_API_TOKEN=${NEXT_PUBLIC_ADMIN_API_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aisales_network

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  aisales_network:
    driver: bridge
